<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <title>Лабораторна робота №2</title>
</head>
<body>
    <h1>Результати виконання ЛР №2</h1>
    <p>Відкрийте консоль розробника (F12), щоб переглянути результати виконання завдань.</p>

    <script>
        var car1 = new Object();
        car1.color = "Red";
        car1.maxSpeed = 220;
        car1.driver = {
            name: "Твоє Прізвище Ім'я",
            category: "B",
            personal_limitations: "No driving at night"
        };
        car1.tuning = true;
        car1["number of accidents"] = 0;

        var car2 = {
            color: "Blue",
            maxSpeed: 190,
            driver: {
                name: "Твоє Прізвище Ім'я",
                category: "B",
                personal_limitations: null
            },
            tuning: false,
            "number of accidents": 2
        };

        car1.drive = function() {
            console.log("I am not driving at night");
        };
        car1.drive();

        car2.drive = function() {
            console.log("I can drive anytime");
        };
        car2.drive();

        function Truck(color, weight, avgSpeed, brand, model) {
            this.color = color;
            this.weight = weight;
            this.avgSpeed = avgSpeed;
            this.brand = brand;
            this.model = model;
            this.trip = function() {
                if (!this.driver) {
                    console.log("No driver assigned");
                } else {
                    var msg = "Driver " + this.driver.name;
                    msg += this.driver.nightDriving ? " drives at night" : " does not drive at night";
                    msg += " and has " + this.driver.experience + " years of experience";
                    console.log(msg);
                }
            };
        }

        Truck.prototype.AssignDriver = function(name, nightDriving, experience) {
            this.driver = {
                name: name,
                nightDriving: nightDriving,
                experience: experience
            };
        };

        var truck1 = new Truck("White", 5000, 80.5, "Volvo", "FH16");
        var truck2 = new Truck("Black", 4500, 75.0, "MAN", "TGX");

        truck1.AssignDriver("Олександр Петров", true, 10);
        truck2.AssignDriver("Іван Сидоров", false, 3);

        truck1.trip();
        truck2.trip();

        class Square {
            constructor(a) {
                this.a = a;
            }

            static help() {
                console.log("Квадрат — це правильний чотирикутник, у якого всі сторони і кути рівні.");
            }

            length() {
                console.log(this.a * 4);
            }

            square() {
                console.log(this.a * this.a);
            }

            info() {
                console.log("Сторони: " + this.a + ", " + this.a + ", " + this.a + ", " + this.a);
                console.log("Кути: 90, 90, 90, 90");
                console.log("Периметр: " + (this.a * 4));
                console.log("Площа: " + (this.a * this.a));
            }
        }

        class Rectangle extends Square {
            constructor(a, b) {
                super(a);
                this.b = b;
            }

            static help() {
                console.log("Прямокутник — чотирикутник, у якого всі кути прямі.");
            }

            length() {
                console.log(2 * (this.a + this.b));
            }

            square() {
                console.log(this.a * this.b);
            }

            info() {
                console.log("Сторони: " + this.a + ", " + this.b + ", " + this.a + ", " + this.b);
                console.log("Кути: 90, 90, 90, 90");
                console.log("Периметр: " + (2 * (this.a + this.b)));
                console.log("Площа: " + (this.a * this.b));
            }
        }

        class Rhombus extends Square {
            constructor(a, alpha, beta) {
                super(a);
                this.alpha = alpha;
                this.beta = beta;
            }

            static help() {
                console.log("Ромб — паралелограм, у якого всі сторони рівні.");
            }

            length() {
                console.log(this.a * 4);
            }

            square() {
                console.log(this.a * this.a * Math.sin(this.alpha * Math.PI / 180));
            }

            info() {
                console.log("Сторони: " + this.a + " (всі 4)");
                console.log("Кути: " + this.alpha + ", " + this.beta + ", " + this.alpha + ", " + this.beta);
                console.log("Периметр: " + (this.a * 4));
                console.log("Площа: " + (this.a * this.a * Math.sin(this.alpha * Math.PI / 180)));
            }
        }

        class Parallelogram extends Rectangle {
            constructor(a, b, alpha, beta) {
                super(a, b);
                this.alpha = alpha;
                this.beta = beta;
            }

            static help() {
                console.log("Паралелограм — чотирикутник, у якого протилежні сторони попарно паралельні.");
            }

            length() {
                console.log(2 * (this.a + this.b));
            }

            square() {
                console.log(this.a * this.b * Math.sin(this.alpha * Math.PI / 180));
            }

            info() {
                console.log("Сторони: " + this.a + ", " + this.b + ", " + this.a + ", " + this.b);
                console.log("Кути: " + this.alpha + ", " + this.beta + ", " + this.alpha + ", " + this.beta);
                console.log("Периметр: " + (2 * (this.a + this.b)));
                console.log("Площа: " + (this.a * this.b * Math.sin(this.alpha * Math.PI / 180)));
            }
        }

        class RectangleWithAccessors extends Rectangle {
            get sideA() { return this.a; }
            set sideA(value) { this.a = value; }
            get sideB() { return this.b; }
            set sideB(value) { this.b = value; }
        }

        Square.help();
        Rectangle.help();
        Rhombus.help();
        Parallelogram.help();

        const s = new Square(5);
        const r = new Rectangle(4, 6);
        const rh = new Rhombus(5, 120, 60);
        const p = new Parallelogram(4, 7, 110, 70);

        s.info();
        r.info();
        rh.info();
        p.info();

        function Triangular(a = 3, b = 4, c = 5) {
            return { a, b, c };
        }

        const tri1 = Triangular();
        const { a: a2, b: b2, c: c2 } = Triangular(6, 8, 10);
        const tri2 = { a: a2, b: b2, c: c2 };
        const { a: a3, b: b3, c: c3 } = Triangular(10, 10, 12);
        const tri3 = { a: a3, b: b3, c: c3 };

        console.log(tri1);
        console.log(tri2);
        console.log(tri3);

        function PiMultiplier(num) {
            return function() {
                return Math.PI * num;
            };
        }

        const mult1 = PiMultiplier(2);
        const mult2 = PiMultiplier(2/3);
        const mult3 = PiMultiplier(1/2);

        console.log(mult1());
        console.log(mult2());
        console.log(mult3());

        function Painter(color) {
            return function(obj) {
                if (obj.type) {
                    console.log(color + " " + obj.type);
                } else {
                    console.log("No 'type' property occurred!");
                }
            };
        }

        const PaintBlue = Painter("Blue");
        const PaintRed = Painter("Red");
        const PaintYellow = Painter("Yellow");

        const obj1 = { maxSpeed: 280, type: "Sportcar", color: "magenta" };
        const obj2 = { type: "Truck", "avg speed": 90, "load capacity": 2400 };
        const obj3 = { maxSpeed: 180, color: "purple", isCar: true };

        PaintBlue(obj1); PaintRed(obj1); PaintYellow(obj1);
        PaintBlue(obj2); PaintRed(obj2); PaintYellow(obj2);
        PaintBlue(obj3); PaintRed(obj3); PaintYellow(obj3);
    </script>
</body>
</html>
