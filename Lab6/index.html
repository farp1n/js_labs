<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <title>Lab 6 - Lights Out</title>
    <style>
        body { font-family: sans-serif; display: flex; flex-direction: column; align-items: center; background: #f0f2f5; }
        .grid { display: grid; gap: 10px; margin: 20px 0; }
        .cell { width: 60px; height: 60px; border-radius: 8px; cursor: pointer; transition: 0.3s; border: none; }
        .on { background: #ffd700; box-shadow: 0 0 15px #ffd700; }
        .off { background: #34495e; }
        .info { font-size: 1.1rem; margin-bottom: 10px; }
        #status { color: #27ae60; font-weight: bold; }
    </style>
</head>
<body>
    <h1>Lights Out</h1>
    <div class="info">Варіант: <span id="lvl-id"></span> | Ціль: <span id="target-moves"></span> ходів</div>
    <div class="info">Твої ходи: <span id="move-count">0</span></div>
    <div id="game-board" class="grid"></div>
    <div id="status"></div>
    <button onclick="location.reload()" style="margin-top: 20px; padding: 10px 20px; cursor: pointer;">Інший рівень</button>

    <script src="script.js"></script>
</body>
</html>
