<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <title>Lab 5 - Clicker Game</title>
    <style>
        body { font-family: sans-serif; text-align: center; }
        #game-area { 
            width: 800px; height: 500px; 
            border: 3px solid #333; margin: 20px auto; 
            display: none; position: relative; background: #eee;
            overflow: hidden;
        }
        .target { position: absolute; cursor: pointer; border: 1px solid #000; }
        .menu { border: 1px solid #ccc; padding: 20px; display: inline-block; }
    </style>
</head>
<body>
    <div id="setup">
        <h1>Налаштування гри</h1>
        <div class="menu">
            <h3>Складність:</h3>
            <input type="radio" name="diff" value="easy" id="e"> <label for="e">Легко</label>
            <input type="radio" name="diff" value="medium" id="m"> <label for="m">Середньо</label>
            <input type="radio" name="diff" value="hard" id="h"> <label for="h">Важко</label>

            <h3>Колір:</h3>
            <input type="radio" name="clr" value="red" id="r"> <label for="r">Червоний</label>
            <input type="radio" name="clr" value="green" id="g"> <label for="g">Зелений</label>
            <input type="radio" name="clr" value="blue" id="b"> <label for="b">Синій</label>
            <br><br>
            <button id="startBtn">СТАРТ</button>
        </div>
    </div>

    <div id="game-area"></div>

    <script src="script.js"></script>
</body>
</html>
