<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aim Clicker - Lab 5</title>
    <style>
        body { 
            font-family: 'Segoe UI', sans-serif; 
            text-align: center; 
            background: #1a1a1a; 
            color: white; 
            margin: 0;
            overflow-x: hidden;
        }
        #setup { margin-top: 50px; }
        .menu { 
            background: #333; 
            padding: 30px; 
            border-radius: 15px; 
            display: inline-block; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        
        #game-area { 
            width: 90vw; 
            height: 70vh; 
            max-width: 1200px;
            min-height: 400px;
            border: 4px solid #444; 
            margin: 20px auto; 
            display: none; 
            position: relative; 
            background: #222;
            overflow: hidden; 
            cursor: crosshair;
        }
        .target { 
            position: absolute; 
            border: 2px solid white; 
            border-radius: 4px; 
            box-shadow: 0 0 10px rgba(255,255,255,0.3);
        }
        .stats { font-size: 24px; margin: 10px; display: none; }
        #timer-bar { 
            width: 100%; 
            height: 8px; 
            background: #e74c3c; 
            position: absolute; 
            top: 0; 
            left: 0; 
            transition: width 0.1s linear; 
        }
        button {
            padding: 12px 40px;
            font-size: 18px;
            background: #27ae60;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            transition: 0.3s;
        }
        button:hover { background: #2ecc71; }
        label { margin-right: 15px; cursor: pointer; }
    </style>
</head>
<body>

    <div id="setup">
        <h1>Aim Clicker Pro</h1>
        <div class="menu">
            <h3>Оберіть складність:</h3>
            <input type="radio" name="diff" value="easy" id="e"> <label for="e">Легко (Центр)</label>
            <input type="radio" name="diff" value="medium" id="m"> <label for="m">Середньо</label>
            <input type="radio" name="diff" value="hard" id="h"> <label for="h">Важко (Весь екран)</label>
            
            <h3>Колір цілі:</h3>
            <input type="radio" name="clr" value="#e74c3c" id="r"> <label for="r">Червоний</label>
            <input type="radio" name="clr" value="#2ecc71" id="g"> <label for="g">Зелений</label>
            <input type="radio" name="clr" value="#3498db" id="b"> <label for="b">Синій</label>
            <br><br>
            <button id="startBtn">СТАРТ</button>
        </div>
    </div>

    <div class="stats" id="stats-ui">
        Очки: <b id="score">0</b> | Час: <b id="time-left">0.0</b>с
    </div>

    <div id="game-area">
        <div id="timer-bar"></div>
    </div>

    <script src="script.js"></script>
</body>
</html>
