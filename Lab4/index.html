<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <title>Lab 4 - JavaScript Sorting</title>
</head>
<body>
    <h1>Лабораторна робота №4</h1>
    <p>Результати сортування та масиви виведені в консоль браузера.</p>

    <script src="sortLib.js"></script>
    <script>
        let normalArray = Array.from({length: 100}, () => Math.floor(Math.random() * 1000));
        let sparseArray = [50, 10, 80];
        sparseArray[105] = 5;

        console.log("ПОЧАТКОВІ ДАНІ:");
        console.log("Нормальний масив:", normalArray);
        console.log("Розріджений масив:", sparseArray);

        console.log("\n=== ТЕСТУВАННЯ: НЕРОЗРІДЖЕНИЙ МАСИВ ===");
        SortLib.bubbleSort([...normalArray]);
        SortLib.selectionSort([...normalArray]);
        SortLib.insertionSort([...normalArray]);
        SortLib.shellSort([...normalArray]);
        SortLib.quickSort([...normalArray]);

        console.log("\n=== ТЕСТУВАННЯ: РОЗРІДЖЕНИЙ МАСИВ ===");
        SortLib.bubbleSort([...sparseArray]);
        SortLib.selectionSort([...sparseArray]);
        SortLib.insertionSort([...sparseArray]);
        SortLib.shellSort([...sparseArray]);
        SortLib.quickSort([...sparseArray]);
    </script>
</body>
</html>
